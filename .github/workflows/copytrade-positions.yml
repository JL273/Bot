name: copytrade-positions
on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'  # every 5 min at off-peak slots
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: copytrade-state
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python job_positions.py
      - name: Commit state changes
        if: always()  # commit whatever state was written, even if previous step failed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage each path individually — `git add a b c` exits 128 and stages
          # NOTHING if any pathspec is missing, so the all-in-one form silently
          # drops every state change (paper_trades.json only exists once a trade closes).
          for path in state signals.json portfolio.json paper_trades.json NOTES.md; do
            [ -e "$path" ] && git add "$path"
          done
          if git diff --cached --quiet; then echo "No changes."; exit 0; fi
          git commit -m "copytrade-positions: poll $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            echo "Retry $i…"; git pull --rebase -X theirs origin "${{ github.ref_name }}"; sleep $((2**i))
          done
          exit 1
